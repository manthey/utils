 sys.stderr,\n            'wsgi.multithread': True,\n            'wsgi.multiprocess': False,\n            'wsgi.run_once': False,\n        }\n        client = scope.get('client')\n        if client:\n            environ['REMOTE_ADDR'] = client[0]\n            environ['REMOTE_PORT'] = str(client[1])\n        server = scope.get('server')\n        if server:\n            environ['SERVER_NAME'] = server[0]\n            environ['SERVER_PORT'] = str(server[1])\n        for name, value in scope.get('headers', []):\n            key = name.decode('latin-1').upper().replace('-', '_')\n            value = value.decode('latin-1')\n            if key in ('CONTENT_TYPE', 'CONTENT_LENGTH'):\n                environ[key] = value\n            else:\n                environ[f'HTTP_{key}'] = value\n        if 'CONTENT_LENGTH' not in environ:\n            environ['wsgi.input_terminated'] = True\n        return environ\n\n    async def __call__(self, scope, receive, send):  # noqa\n        if scope['type'] != 'http':\n            return\n        loop = asyncio.get_running_loop()\n        rsock, wsock = socket.socketpair()\n        rsock.setblocking(True)\n        wsock.setblocking(False)\n        response_status = {}\n        response_headers = []\n        response_chunks = []\n        error = []\n\n        def start_response(status, headers, exc_info=None):\n            response_headers.clear()\n            response_status['code'] = int(status.split()[0])\n            response_headers.extend(\n                (k.encode('latin-1'), v.encode('latin-1'))\n                for k, v in headers\n            )\n\n            def write(data):\n                if data:\n                    response_chunks.append(bytes(data))\n\n            return write\n\n        def run_wsgi():\n            body_file = rsock.makefile('rb')\n            try:\n                environ = self._build_environ(scope, body_file)\n                result = self._app(environ, start_response)\n                try:\n                    for chunk in result:\n                        if chunk:\n                            response_chunks.append(bytes(chunk))\n                finally:\n                    if hasattr(result, 'close'):\n                        result.close()\n            except Exception as exc:\n                error.append(exc)\n            finally:\n                body_file.close()\n                rsock.close()\n\n        thread = threading.Thread(target=run_wsgi, daemon=True)\n        thread.start()\n        try:\n            while True:\n                message = await receive()\n                if message['type'] == 'http.disconnect':\n                    break\n                body = message.get('body', b'')\n                if body:\n                    await loop.sock_sendall(wsock, body)\n                if not message.get('more_body', False):\n                    break\n        finally:\n            try:\n                wsock.shutdown(socket.SHUT_WR)\n            except OSError:\n                pass\n            wsock.close()\n        thread.join()\n        if error:\n            raise error[0]\n        await send({\n            'type': 'http.response.start',\n            'status': response_status.get('code', 500),\n            'headers': response_headers,\n        })\n        await send({\n            'type': 'http.response.body',\n            'body': b''.join(response_chunks),\n            'more_body': False,\n        })\n\n\n\n\n### File: test/test_asgi_headers.py (lines 1-26)\nimport os\nimport stat\n\nimport requests\n\nfrom girder.models.file import File\nfrom girder.models.folder import Folder\nfrom pytest_girder.utils import uploadFile\n\n\ndef test_download_unreadable_file(asgiBoundServer, admin, fsAssetstore):\n    dest = Folder().childFolders(admin, parentType='user')[0]\n    test_file = uploadFile('test.txt', b'content', admin, dest)\n    file = File().load(test_file['_id'], force=True)\n    adapter = File().getAssetstoreAdapter(file)\n    path = adapter.getLocalFilePath(file)\n    original_mode = os.stat(path).st_mode\n    try:\n        os.chmod(path, original_mode & ~stat.S_IROTH & ~stat.S_IRGRP & ~stat.S_IRUSR)\n        resp = requests.get(\n            f'http://127.0.0.1:{asgiBoundServer.boundPort}/api/v1/file/{file[\"_id\"]}/download',\n        )\n    finally:\n        os.chmod(path, original_mode)\n    assert resp.status_code == 500\n    assert int(resp.headers['Content-Length']) > 10\n\n### File: test/test_file.py (lines 1-35)\nimport io\n\nimport pytest\n\nfrom girder.models.file import File\nfrom girder.models.folder import Folder\nfrom girder.models.upload import Upload\nfrom pytest_girder.assertions import assertStatus\nfrom pytest_girder.utils import uploadFile\n\n\ndef testEmptyUploadFromFile(admin, fsAssetstore):\n    dest = Folder().childFolders(admin, parentType='user')[0]\n    file = Upload().uploadFromFile(io.BytesIO(b''), size=0, name='empty', parent=dest, user=admin)\n    assert File().load(file['_id'], force=True) is not None\n    assert file['assetstoreId'] == fsAssetstore['_id']\n\n\n@pytest.mark.parametrize('range,status,cr,cl', (\n    ('bytes=0-', 206, 'bytes 0-99/100', 100),\n    ('bytes=0-10', 206, 'bytes 0-10/100', 11),\n    (None, 200, None, 100)\n))\ndef testRangeRequestBehavior(range, status, cr, cl, admin, server, fsAssetstore):\n    dest = Folder().childFolders(admin, parentType='user')[0]\n    file = uploadFile('test', b'a' * 100, admin, dest)\n    headers = [('Range', range)] if range else []\n    resp = server.request(\n        path='/file/%s/download' % file['_id'], user=admin, additionalHeaders=headers, isJson=False)\n    assertStatus(resp, status)\n    assert resp.headers['Content-Length'] == cl\n    if cr is None:\n        assert 'Content-Range' not in resp.headers\n    else:\n        assert resp.headers['Content-Range'] == cr\n\n"}, {"role": "user", "content": "I have this issue:\n\n# Downloads put entire content of the file into memory\u00a0#3799\n\nThis is similar issue to\u00a0[#3795](https://github.com/girder/girder/issues/3795)\u00a0but in reverse. WSGI <-> ASGI layer doesn't propagate backpressure during download. As a result WSGI pushes entire file almost instantaneously to ASGI buffer, and when client is slow it just sits there.\n\n### How to reproduce\n\n1. Upload a large file to girder.\n2. Download it back with throttling your bandwidth.\n\n### Expected results\n\nMemory consumed by girder process stays fairly flat.\n\n### Actual results\n\nMemory skyrockets.\n\n---\n\nI want to write a test that shows the problem so when I fix it I can confirm it is fixed.  I expect that this will require using the `asgiBoundServer` fixture.  I also expect the fix will be some modification to girder/asgi.py, probably to the `_WSGIBridge`.  Please write the appropriate test.\n"}]
